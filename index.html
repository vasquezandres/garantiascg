<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Crear Formulario de Garantía</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1><i class="fa-solid fa-file-shield"></i>Crear formulario de garantía</h1>
      <p>Completa la información y genera el enlace que luego enviarás al cliente.</p>

      <div class="grid two">
        <div class="field">
          <label for="proyecto"><i class="fa-solid fa-building"></i>Proyecto</label>
          <input id="proyecto" type="text" placeholder="Nombre del proyecto">
        </div>

        <div class="field">
          <label for="torre"><i class="fa-solid fa-tower-observation"></i>Torre</label>
          <input id="torre" type="text" placeholder="Ej: 500">
        </div>

        <div class="field">
          <label for="apartamento"><i class="fa-solid fa-door-open"></i>Apartamento</label>
          <input id="apartamento" type="text" placeholder="Ej: 12F">
        </div>

        <div class="field">
          <label for="cliente"><i class="fa-solid fa-user"></i>Cliente</label>
          <input id="cliente" type="text" placeholder="Nombre del cliente">
        </div>

        <div class="field">
          <label for="fecha"><i class="fa-solid fa-calendar"></i>Fecha</label>
          <input id="fecha" type="date">
        </div>

        <div class="field">
          <label for="hora"><i class="fa-solid fa-clock"></i>Hora</label>
          <input id="hora" type="time">
        </div>
      </div>

      <div class="section">
        <div class="field">
          <label for="correo_responsable"><i class="fa-solid fa-envelope"></i>Correo del responsable</label>
          <input id="correo_responsable" type="email" placeholder="correo@ejemplo.com">
        </div>
      </div>

      <div class="section">
        <div class="field">
          <label for="correos_cc"><i class="fa-solid fa-envelopes-bulk"></i>Copias internas <span style="font-weight:400;color:#9ca3af;">(opcional)</span></label>
          <input id="correos_cc" type="text" placeholder="gerencia@empresa.com, admin@empresa.com">
          <div class="hint">Separa varios correos con coma. Recibirán copia al crear y al firmar.</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title"><i class="fa-solid fa-list-check"></i>Ítems de garantía</div>
        <div id="itemsContainer" class="items-list"></div>
        <button class="btn-add" type="button" onclick="addItem()"><i class="fa-solid fa-plus"></i>Agregar ítem</button>
      </div>

      <div class="section">
        <div class="field">
          <label for="observaciones"><i class="fa-solid fa-comment-dots"></i>Observaciones</label>
          <textarea id="observaciones" placeholder="Notas adicionales..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="btnGenerar" class="btn-primary" type="button" onclick="crearFormulario()"><i class="fa-solid fa-link"></i>Generar enlace de firma</button>
      </div>

      <div id="resultado" class="result"></div>

      <div id="accionesEnlace" class="actions inline" style="display:none;">
        <button class="btn-secondary" type="button" onclick="copiarEnlace()"><i class="fa-solid fa-copy"></i>Copiar enlace</button>
        <button class="btn-whatsapp" type="button" onclick="compartirWhatsApp()"><i class="fa-brands fa-whatsapp"></i>WhatsApp</button>
        <button class="btn-share" type="button" onclick="compartirGeneral()"><i class="fa-solid fa-share-nodes"></i>Compartir</button>
      </div>

      <div id="copiadoMsg" class="small-note"><i class="fa-solid fa-circle-check"></i>Enlace copiado correctamente.</div>

      <div class="footer-note">
        Sistema desarrollado por <a href="https://solutech.com.pa" target="_blank" rel="noopener">Solutech Panamá</a>
      </div>
    </div>
  </div>

  <script src="/assets/config.js"></script>
  <script src="/assets/api.js"></script>
  <script src="/assets/crear.js"></script>
</body>
</html>
