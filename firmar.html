<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <meta name="description" content="Firma del formulario de garantía.">

  <title>Firma de garantía</title>

  <!-- Solo iconos básicos; NO manifest ni SW: la firma debe funcionar
       desde un enlace directo sin instalar ni cachear nada. -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="page">
    <div class="card">
      <header class="header success">
        <div class="icon-badge"><i class="fa-solid fa-file-signature" aria-hidden="true"></i></div>
        <div>
          <h1>Revisión y firma</h1>
          <p class="subtitle">Confirma los puntos y firma para finalizar.</p>
        </div>
      </header>

      <div id="contenido" aria-live="polite">
        <div class="loading-state">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loading-title">Cargando formulario de garantía...</div>
          <div class="loading-subtitle">Esto puede tardar unos segundos.</div>
        </div>
      </div>

      <div class="footer-note">
        Sistema desarrollado por <a href="https://solutech.com.pa" target="_blank" rel="noopener">Solutech Panamá</a>
      </div>
    </div>
  </main>

  <script src="/assets/config.js"></script>
  <script src="/assets/api.js"></script>
  <script src="/assets/firmar.js"></script>
</body>
</html>
